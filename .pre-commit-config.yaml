repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: Ruff linter
        entry: poetry run ruff check app/
        language: system
        types: [python]
        stages: [pre-commit]
        always_run: true

      - id: ruff-format
        name: Ruff formatter
        entry: poetry run ruff format app/
        language: system
        types: [python]
        stages: [pre-commit]
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: Run mypy
        entry: poetry run mypy app/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: bandit
        name: Run bandit
        entry: poetry run bandit -c pyproject.toml -r app/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
